<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Career Quiz</title>

  <link rel="stylesheet" href="../css/quiz.css">
</head>

<body>
  <header class="page-header">
    <h1>ICT Career Quiz</h1>
    <p>Answer 15 questions and we will recommend your best ICT career path.</p>
  </header>

  <main class="quiz-container">
    <div class="quiz-progress">
      <p id="progressText">Question 1 / 15</p>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <div class="quiz-card">
      <h2 id="questionText">Loading...</h2>
      <div id="optionsContainer" class="options-grid"></div>
    </div>
  </main>

  <footer class="page-footer">
    <p>&copy; 2026 Career Assessment Tool</p>
  </footer>

  <script src="../js/quiz.js"></script>
</body>
</html>
